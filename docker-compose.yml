services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: projet_test_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./admin:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow
    restart: always
    volumes:
      - ./airflow:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
    tty: true

  adminer:
    image: adminer:latest
    container_name: projet_test_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  cassandra:
    image: cassandra:4
    container_name: projet_test_cassandra
    restart: always
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: [ "CMD-SHELL", "nodetool status | grep -q 'UN'" ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  cassandra_data:
