services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - PYTHONPATH=/app:/app/src
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - crypto-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')" ]
      interval: 10s
      timeout: 5s
      retries: 6
  cassandra:
    image: cassandra:4
    container_name: cassandra
    restart: always
    environment:
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - CASSANDRA_BROADCAST_RPC_ADDRESS=cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: [ "CMD-SHELL", "nodetool status | grep -q 'UN'" ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - crypto-network
  cassandra-init:
    image: cassandra:latest
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./api/scripts/schema_cassandra.cql:/init.cql
    entrypoint: >
      bash -c "echo 'Cassandra prête, initialisation du schéma...'; cqlsh cassandra 9042 -f /init.cql && echo 'Schéma initialisé avec succès.'"
    networks:
      - crypto-network
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/scripts/schema_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crypto-network
  adminer:
    image: adminer:latest
    container_name: projet_test_adminer
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crypto-network
  tests:
    image: python:3.11-slim
    container_name: tests
    profiles:
      - test
    volumes:
      - ./tests:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    entrypoint: >
      sh -c " pip install httpx && pip install pytest && pytest -v "
    networks:
      crypto-network:
  streamlit:
    build: ./streamlit
    command: streamlit run streamlit/main.py --server.port 8501
    volumes:
      - ./:/usr/src/app
    ports:
      - 8501:8501
    image: yourstreamlitapp:latest
    networks:
      crypto-network:
volumes:
  postgres_data:
  cassandra_data:
networks:
  crypto-network:
